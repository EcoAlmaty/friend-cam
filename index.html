<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FriendCam</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --text: #e8e8f0;
    --muted: #5a5a7a;
    --green: #4ade80;
    --red: #f87171;
  }

  body {
    font-family: 'Syne', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 20px;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse 60% 40% at 20% 20%, rgba(124,106,247,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 50% 50% at 80% 80%, rgba(247,160,106,0.05) 0%, transparent 60%);
    pointer-events: none;
  }

  .logo {
    font-size: 1.4rem;
    font-weight: 800;
    margin-bottom: 40px;
  }
  .logo span { color: var(--accent); }

  /* ROLE SCREEN */
  #role-screen {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }
  #role-screen h2 { font-size: 1.8rem; font-weight: 800; }
  #role-screen p { color: var(--muted); font-size: 0.85rem; font-family: 'JetBrains Mono', monospace; margin-bottom: 8px; }

  .role-btn {
    width: 100%;
    padding: 20px 24px;
    border: 1px solid var(--border);
    border-radius: 12px;
    background: var(--surface);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 16px;
    transition: all 0.2s;
  }
  .role-btn:hover { border-color: var(--accent); background: rgba(124,106,247,0.08); transform: translateY(-1px); }
  .role-btn .icon { font-size: 2rem; }
  .role-btn .desc { font-size: 0.8rem; color: var(--muted); font-weight: 400; font-family: 'JetBrains Mono', monospace; }

  /* ROOM SCREEN */
  #room-screen {
    display: none;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    width: 100%;
    max-width: 420px;
  }
  #room-screen h2 { font-size: 1.5rem; font-weight: 800; }
  #room-screen p { color: var(--muted); font-size: 0.85rem; font-family: 'JetBrains Mono', monospace; text-align: center; }

  .input-group { width: 100%; display: flex; flex-direction: column; gap: 8px; }
  .input-group label { font-size: 0.8rem; color: var(--muted); font-family: 'JetBrains Mono', monospace; }
  input[type="text"] {
    width: 100%; padding: 12px 16px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; color: var(--text);
    font-family: 'JetBrains Mono', monospace; font-size: 1rem;
    outline: none; transition: border-color 0.2s;
  }
  input[type="text"]:focus { border-color: var(--accent); }

  .copy-box {
    width: 100%; background: var(--surface);
    border: 1px dashed var(--accent); border-radius: 10px;
    padding: 12px 16px; font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem; color: var(--accent);
    word-break: break-all; cursor: pointer; transition: background 0.2s;
  }
  .copy-box:hover { background: rgba(124,106,247,0.1); }
  .copy-box small { display: block; color: var(--muted); font-size: 0.7rem; margin-bottom: 4px; }

  .btn-row { display: flex; gap: 10px; width: 100%; }

  /* APP SCREEN — fullscreen video */
  #app-screen {
    display: none;
    position: fixed;
    inset: 0;
    background: #000;
  }

  #main-video {
    width: 100%; height: 100%;
    object-fit: cover;
    display: block;
  }

  /* overlay UI */
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 24px;
    pointer-events: none;
  }

  .overlay-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .status-badge {
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.8rem;
    padding: 8px 14px;
    border-radius: 100px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    pointer-events: all;
  }
  .status-dot {
    width: 8px; height: 8px; border-radius: 50%;
    background: var(--muted); transition: background 0.3s;
  }
  .status-dot.connected { background: var(--green); box-shadow: 0 0 8px var(--green); }
  .status-dot.waiting { background: #f7a06a; animation: pulse 1.5s infinite; }
  .status-dot.error { background: var(--red); }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .room-badge {
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.75rem;
    padding: 8px 14px;
    border-radius: 100px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    color: var(--accent);
  }

  .overlay-bottom {
    display: flex;
    justify-content: center;
    pointer-events: all;
  }

  .ctrl-btn {
    padding: 12px 22px;
    border-radius: 10px;
    border: 1px solid rgba(255,255,255,0.15);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-weight: 700;
    font-size: 0.85rem;
    cursor: pointer;
    transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
  }
  .ctrl-btn:hover { background: rgba(248,113,113,0.3); border-color: var(--red); color: var(--red); }
  .ctrl-btn.primary {
    background: var(--accent); border-color: var(--accent); color: #fff;
  }
  .ctrl-btn.primary:hover { background: #6b59e6; border-color: #6b59e6; color: #fff; }

  /* waiting placeholder */
  #waiting-overlay {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    background: var(--bg);
  }
  #waiting-overlay .big { font-size: 4rem; }
  #waiting-overlay p { font-family: 'JetBrains Mono', monospace; color: var(--muted); font-size: 0.9rem; }
  #waiting-overlay .logo2 { font-size: 1.2rem; font-weight: 800; margin-bottom: 16px; }
  #waiting-overlay .logo2 span { color: var(--accent); }
</style>
</head>
<body>

<div class="logo">friend<span>cam</span></div>

<!-- ROLE SELECTION -->
<div id="role-screen">
  <h2>Выбери роль</h2>
  <p>// кто ты в этом сеансе?</p>
  <button class="role-btn" onclick="selectRole('broadcaster')">
    <span class="icon">📡</span>
    <div>
      <div>Транслировать</div>
      <div class="desc">Включить свою камеру, друг смотрит</div>
    </div>
  </button>
  <button class="role-btn" onclick="selectRole('viewer')">
    <span class="icon">👁️</span>
    <div>
      <div>Смотреть</div>
      <div class="desc">Смотреть камеру друга</div>
    </div>
  </button>
</div>

<!-- ROOM SETUP -->
<div id="room-screen">
  <h2 id="room-title"></h2>
  <p id="room-desc"></p>

  <div class="input-group">
    <label>ID комнаты</label>
    <input type="text" id="room-input" placeholder="например: mojkot42" maxlength="20" />
  </div>

  <div id="share-box" style="display:none">
    <div class="copy-box" onclick="copyLink()" id="share-link">
      <small>📋 Нажми чтобы скопировать ссылку для друга</small>
    </div>
  </div>

  <div class="btn-row">
    <button class="ctrl-btn" onclick="goBack()">← Назад</button>
    <button class="ctrl-btn primary" onclick="enterRoom()">Войти →</button>
  </div>
</div>

<!-- FULLSCREEN APP -->
<div id="app-screen">
  <div id="waiting-overlay">
    <div class="logo2">friend<span>cam</span></div>
    <div class="big" id="waiting-icon">⏳</div>
    <p id="waiting-text">подключаемся...</p>
  </div>

  <video id="main-video" autoplay playsinline style="display:none"></video>

  <div class="overlay">
    <div class="overlay-top">
      <div class="status-badge">
        <div class="status-dot waiting" id="status-dot"></div>
        <span id="status-text">ожидание...</span>
      </div>
      <div class="room-badge" id="room-label"></div>
    </div>
    <div class="overlay-bottom">
      <button class="ctrl-btn" onclick="hangUp()">📵 Завершить</button>
    </div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDHkTj-xhRz7hJ4N0QSZGx4bxP3g1xVOnI",
  authDomain: "friend-cam.firebaseapp.com",
  databaseURL: "https://friend-cam-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "friend-cam",
  storageBucket: "friend-cam.firebasestorage.app",
  messagingSenderId: "338948412344",
  appId: "1:338948412344:web:452b8f656617ed352b354d"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const iceServers = { iceServers: [{ urls: "stun:stun.l.google.com:19302" }] };

let role = null, roomId = null, pc = null, localStream = null;

const params = new URLSearchParams(location.search);
const urlRole = params.get('role');
const urlRoom = params.get('room');

window.selectRole = (r) => {
  role = r;
  document.getElementById('role-screen').style.display = 'none';
  const rs = document.getElementById('room-screen');
  rs.style.display = 'flex';
  document.getElementById('room-title').textContent = r === 'broadcaster' ? '📡 Трансляция' : '👁️ Смотреть';
  document.getElementById('room-desc').textContent = r === 'broadcaster'
    ? 'Придумай ID комнаты и отправь другу ссылку'
    : 'Введи ID комнаты от друга';

  if (r === 'broadcaster') {
    const id = Math.random().toString(36).substr(2, 8);
    document.getElementById('room-input').value = id;
    updateShareLink(id);
    document.getElementById('share-box').style.display = 'block';
    document.getElementById('room-input').addEventListener('input', e => updateShareLink(e.target.value));
  }
};

function updateShareLink(id) {
  const link = `${location.origin}${location.pathname}?role=viewer&room=${id}`;
  const el = document.getElementById('share-link');
  el.innerHTML = `<small>📋 Нажми чтобы скопировать ссылку для друга</small>${link}`;
  el._link = link;
}

window.copyLink = () => {
  const el = document.getElementById('share-link');
  navigator.clipboard.writeText(el._link);
  el.innerHTML = `<small>✅ Скопировано!</small>${el._link}`;
  setTimeout(() => updateShareLink(document.getElementById('room-input').value), 2000);
};

window.goBack = () => {
  document.getElementById('room-screen').style.display = 'none';
  document.getElementById('role-screen').style.display = 'flex';
};

window.enterRoom = async () => {
  roomId = document.getElementById('room-input').value.trim();
  if (!roomId) return alert('Введи ID комнаты');
  launchApp();
};

function launchApp() {
  document.getElementById('room-screen').style.display = 'none';
  document.getElementById('role-screen').style.display = 'none';
  document.getElementById('app-screen').style.display = 'block';
  document.getElementById('room-label').textContent = '# ' + roomId;
  startSession();
}

function setStatus(state, text) {
  document.getElementById('status-dot').className = 'status-dot ' + state;
  document.getElementById('status-text').textContent = text;
}

function setWaiting(icon, text) {
  document.getElementById('waiting-icon').textContent = icon;
  document.getElementById('waiting-text').textContent = text;
}

async function startSession() {
  pc = new RTCPeerConnection(iceServers);

  if (role === 'broadcaster') {
    // транслятор: камера на весь экран (своё превью)
    setWaiting('📷', 'запрашиваем камеру...');
    try {
      localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    } catch(e) {
      setWaiting('❌', 'нет доступа к камере');
      setStatus('error', 'ошибка камеры');
      return;
    }
    // показываем себя
    const vid = document.getElementById('main-video');
    vid.srcObject = localStream;
    vid.muted = true;
    vid.style.display = 'block';
    document.getElementById('waiting-overlay').style.display = 'none';
    setStatus('waiting', 'ждём наблюдателя...');

    localStream.getTracks().forEach(t => pc.addTrack(t, localStream));

    pc.onicecandidate = async (e) => {
      if (e.candidate) await pushCandidate('broadcaster', e.candidate.toJSON());
    };

    pc.onconnectionstatechange = () => {
      if (pc.connectionState === 'connected') setStatus('connected', 'наблюдатель подключён');
      if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') setStatus('error', 'разрыв');
    };

    await remove(ref(db, `rooms/${roomId}`));
    const offer = await pc.createOffer();
    await pc.setLocalDescription(offer);
    await set(ref(db, `rooms/${roomId}/offer`), { sdp: offer.sdp, type: offer.type });

    onValue(ref(db, `rooms/${roomId}/answer`), async (snap) => {
      if (snap.val() && !pc.currentRemoteDescription) {
        await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
        watchCandidates('viewer');
      }
    });

  } else {
    // наблюдатель: ждёт поток, камера не нужна
    setWaiting('⏳', 'ждём трансляцию...');
    setStatus('waiting', 'ждём трансляцию...');

    pc.ontrack = (e) => {
      const vid = document.getElementById('main-video');
      vid.srcObject = e.streams[0];
      vid.style.display = 'block';
      document.getElementById('waiting-overlay').style.display = 'none';
      setStatus('connected', 'подключено');
    };

    pc.onicecandidate = async (e) => {
      if (e.candidate) await pushCandidate('viewer', e.candidate.toJSON());
    };

    pc.onconnectionstatechange = () => {
      if (pc.connectionState === 'disconnected' || pc.connectionState === 'failed') {
        setStatus('error', 'разрыв соединения');
        document.getElementById('waiting-overlay').style.display = 'flex';
        document.getElementById('main-video').style.display = 'none';
        setWaiting('📵', 'соединение прервано');
      }
    };

    onValue(ref(db, `rooms/${roomId}/offer`), async (snap) => {
      if (!snap.val() || pc.signalingState !== 'stable') return;
      await pc.setRemoteDescription(new RTCSessionDescription(snap.val()));
      const answer = await pc.createAnswer();
      await pc.setLocalDescription(answer);
      await set(ref(db, `rooms/${roomId}/answer`), { sdp: answer.sdp, type: answer.type });
      watchCandidates('broadcaster');
    });
  }
}

async function pushCandidate(who, c) {
  const snap = await get(ref(db, `rooms/${roomId}/${who}/candidates`));
  const arr = snap.val() || [];
  arr.push(c);
  await set(ref(db, `rooms/${roomId}/${who}/candidates`), arr);
}

function watchCandidates(from) {
  onValue(ref(db, `rooms/${roomId}/${from}/candidates`), async (snap) => {
    if (!snap.val()) return;
    for (const c of snap.val()) {
      try { await pc.addIceCandidate(new RTCIceCandidate(c)); } catch(e) {}
    }
  });
}

window.hangUp = async () => {
  if (pc) pc.close();
  if (localStream) localStream.getTracks().forEach(t => t.stop());
  await remove(ref(db, `rooms/${roomId}`));
  location.href = location.pathname;
};

// автозапуск по ссылке
if (urlRole && urlRoom) {
  role = urlRole;
  roomId = urlRoom;
  launchApp();
}
</script>
</body>
</html>
